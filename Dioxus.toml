[application]
name = "CheenHub"
default_platform = "web"
asset_dir = "crates/client/assets"
sub_package = "cheenhub_client"
android_main_activity = "android/MainActivity.kt"
android_manifest = "android/AndroidManifest.xml"

[bundle]
identifier = "ru.cheenhub"
publisher = "CheenHub"
icon = ["../../icons/icon.ico"]
short_description = "CheenHub voice chat"
long_description = "CheenHub desktop and mobile client."

[web.app]
title = "CheenHub — голосовой чат для геймеров"

[windows]
identifier = "ru.cheenhub"

[bundle.windows]
webview_install_mode = { DownloadBootstrapper = { silent = true } }

[bundle.windows.nsis]
template = "bundle/windows/nsis-installer.nsi"
installer_icon = "../../icons/icon.ico"

[bundle.windows.wix]
upgrade_code = "082cd097-8bbc-4aca-94f7-7881dda02673"

[linux]
identifier = "ru.cheenhub"
categories = ["Network", "Chat"]
section = "net"
depends = [
    "libwebkit2gtk-4.1-0",
    "libgtk-3-0",
    "libayatana-appindicator3-1",
    "libasound2",
    "libudev1",
]

[android]
identifier = "ru.cheenhub"
min_sdk = 24
target_sdk = 35
compile_sdk = 35
foreground_service_types = ["microphone", "mediaPlayback", "camera", "mediaProjection"]
gradle_dependencies = ["com.google.firebase:firebase-messaging:25.0.1"]

[android.permissions]
"android.permission.INTERNET" = { description = "Network access for CheenHub API and realtime transport" }
"android.permission.RECORD_AUDIO" = { description = "Voice chat microphone capture" }
"android.permission.CAMERA" = { description = "Camera capture" }
"android.permission.MODIFY_AUDIO_SETTINGS" = { description = "Voice audio routing and communication mode" }
"android.permission.FOREGROUND_SERVICE" = { description = "Keep active voice and media capture sessions running" }
"android.permission.FOREGROUND_SERVICE_MICROPHONE" = { description = "Keep microphone capture running during an active voice session" }
"android.permission.FOREGROUND_SERVICE_CAMERA" = { description = "Keep camera capture running during an active video session" }
"android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION" = { description = "Keep an explicitly approved screen sharing session running" }
"android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" = { description = "Keep voice playback running during an active voice session" }
"android.permission.POST_NOTIFICATIONS" = { description = "Show direct-message and active media notifications" }
