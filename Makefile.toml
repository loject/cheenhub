[config]
default_to_workspace = false

[env]
CARGO_MAKE_CRATE_INSTALLATION_LOCKED = true
DIOXUS_ADDR = { value = "0.0.0.0", condition = { env_not_set = ["DIOXUS_ADDR"] } }
DIOXUS_PORT = { value = "8080", condition = { env_not_set = ["DIOXUS_PORT"] } }
POSTGRES_CONTAINER = { value = "cheenhub-postgres", condition = { env_not_set = ["POSTGRES_CONTAINER"] } }
POSTGRES_USER = { value = "postgres", condition = { env_not_set = ["POSTGRES_USER"] } }
POSTGRES_PASSWORD = { value = "mysecretpassword", condition = { env_not_set = ["POSTGRES_PASSWORD"] } }
POSTGRES_DB = { value = "cheenhub", condition = { env_not_set = ["POSTGRES_DB"] } }
POSTGRES_PORT = { value = "5432", condition = { env_not_set = ["POSTGRES_PORT"] } }
MICROPHONE_WORKER_OUT_DIR = { value = "crates/client/public/workers/microphone", condition = { env_not_set = ["MICROPHONE_WORKER_OUT_DIR"] } }
RELEASE_BUNDLE_OUT_DIR = { value = "target/cheenhub-release/raw", condition = { env_not_set = ["RELEASE_BUNDLE_OUT_DIR"] } }

[tasks.default]
alias = "dev-stack"

[tasks.dev-stack]
description = "Ensure local infrastructure and run the backend watcher plus Dioxus dev server."
dependencies = ["setup", "ensure-local-jwt-env", "ensure-docker-desktop", "ensure-postgres"]
run_task = "dev-services"

[tasks.dev-stack-desktop]
description = "Ensure local infrastructure and run the backend watcher plus Dioxus desktop app."
dependencies = ["setup", "ensure-local-jwt-env", "ensure-docker-desktop", "ensure-postgres"]
run_task = "dev-services-desktop"

[tasks.ensure-local-jwt-env]
description = "Ensure local .env contains a valid matching JWT Ed25519 key pair."
command = "cargo"
args = [
    "run",
    "--quiet",
    "-p",
    "cheenhub_backend",
    "--bin",
    "cheenhub_generate_jwt_keys",
    "--",
    "--ensure-local-env",
    ".env",
    "--key-id",
    "dev-ed25519-1",
]

[tasks.dev-services]
description = "Run the backend watcher, microphone worker watcher, and Dioxus dev server in parallel."
run_task = { name = ["backend-watch", "microphone-worker-watch", "dioxus-web"], fork = true, parallel = true }

[tasks.dev-services-desktop]
description = "Run the backend watcher and Dioxus desktop app in parallel."
run_task = { name = ["backend-watch", "dioxus-desktop"], fork = true, parallel = true }

[tasks.dev-services-desktop-profile]
description = "Run the backend watcher and Dioxus desktop app with Dioxus render profiling."
run_task = { name = ["backend-watch", "dioxus-desktop-profile"], fork = true, parallel = true }

[tasks.backend-watch]
description = "Run the backend through cargo-watch."
dependencies = ["install-cargo-watch"]
command = "cargo"
args = ["watch", "-x", "run -p cheenhub_backend"]

[tasks.dioxus-web]
description = "Run the Dioxus web dev server."
dependencies = ["install-dioxus-cli", "build-microphone-worker-wasm"]
command = "dx"
args = [
    "serve",
    "--package",
    "cheenhub_client",
    "--bin",
    "cheen_hub",
    "--addr",
    "${DIOXUS_ADDR}",
    "--port",
    "${DIOXUS_PORT}",
]

[tasks.dioxus-desktop]
description = "Run the Dioxus desktop dev app."
linux_alias = "dioxus-desktop-linux"
mac_alias = "dioxus-desktop-mac"
windows_alias = "dioxus-desktop-windows"

[tasks.dioxus-desktop-linux]
description = "Run the Dioxus desktop dev app on Linux."
dependencies = ["install-dioxus-cli"]
command = "dx"
args = [
    "serve",
    "--desktop",
    "--package",
    "cheenhub_client",
    "--bin",
    "cheen_hub",
    "--no-default-features",
    "--features",
    "desktop,linux",
]

[tasks.dioxus-desktop-mac]
description = "Run the Dioxus desktop dev app on macOS."
dependencies = ["install-dioxus-cli"]
command = "dx"
args = [
    "serve",
    "--desktop",
    "--package",
    "cheenhub_client",
    "--bin",
    "cheen_hub",
    "--no-default-features",
    "--features",
    "desktop,macos",
]

[tasks.dioxus-desktop-windows]
description = "Run the Dioxus desktop dev app on Windows."
dependencies = ["install-dioxus-cli"]
command = "dx"
args = [
    "serve",
    "--desktop",
    "--package",
    "cheenhub_client",
    "--bin",
    "cheen_hub",
    "--no-default-features",
    "--features",
    "desktop,windows",
]

[tasks.dioxus-desktop-profile]
description = "Run the Dioxus desktop dev app with Dioxus render profiling."
linux_alias = "dioxus-desktop-profile-linux"
mac_alias = "dioxus-desktop-profile-mac"
windows_alias = "dioxus-desktop-profile-windows"

[tasks.dioxus-desktop-profile-linux]
description = "Run the Dioxus desktop dev app on Linux with Dioxus render profiling."
dependencies = ["install-dioxus-cli"]
env = { CHEENHUB_DIOXUS_PROFILE = "1" }
command = "dx"
args = [
    "serve",
    "--desktop",
    "--package",
    "cheenhub_client",
    "--bin",
    "cheen_hub",
    "--no-default-features",
    "--features",
    "desktop,linux",
]

[tasks.dioxus-desktop-profile-mac]
description = "Run the Dioxus desktop dev app on macOS with Dioxus render profiling."
dependencies = ["install-dioxus-cli"]
env = { CHEENHUB_DIOXUS_PROFILE = "1" }
command = "dx"
args = [
    "serve",
    "--desktop",
    "--package",
    "cheenhub_client",
    "--bin",
    "cheen_hub",
    "--no-default-features",
    "--features",
    "desktop,macos",
]

[tasks.dioxus-desktop-profile-windows]
description = "Run the Dioxus desktop dev app on Windows with Dioxus render profiling."
dependencies = ["install-dioxus-cli"]
env = { CHEENHUB_DIOXUS_PROFILE = "1" }
command = "dx"
args = [
    "serve",
    "--desktop",
    "--package",
    "cheenhub_client",
    "--bin",
    "cheen_hub",
    "--no-default-features",
    "--features",
    "desktop,windows",
]

[tasks.build-web]
description = "Build the microphone worker wasm artifact and the Dioxus web client."
dependencies = ["install-dioxus-cli", "build-microphone-worker-wasm-release"]
command = "dx"
args = [
    "build",
    "--web",
    "--package",
    "cheenhub_client",
    "--bin",
    "cheen_hub",
    "--release",
]

[tasks.bundle-windows-release]
description = "Build Windows NSIS and MSI client bundles."
dependencies = ["bundle-windows-exe-release", "bundle-windows-msi-release"]

[tasks.bundle-windows-exe-release]
description = "Build the Windows NSIS .exe client installer."
dependencies = ["install-dioxus-cli", "check-release-version"]
command = "dx"
args = [
    "bundle",
    "--windows",
    "--package",
    "cheenhub_client",
    "--bin",
    "cheen_hub",
    "--release",
    "--no-default-features",
    "--features",
    "desktop,windows",
    "--package-types",
    "nsis",
    "--out-dir",
    "${RELEASE_BUNDLE_OUT_DIR}/windows",
]

[tasks.bundle-windows-msi-release]
description = "Build the Windows MSI client installer."
dependencies = ["install-dioxus-cli", "check-release-version"]
command = "dx"
args = [
    "bundle",
    "--windows",
    "--package",
    "cheenhub_client",
    "--bin",
    "cheen_hub",
    "--release",
    "--no-default-features",
    "--features",
    "desktop,windows",
    "--package-types",
    "msi",
    "--out-dir",
    "${RELEASE_BUNDLE_OUT_DIR}/windows",
]

[tasks.bundle-linux-release]
description = "Build Linux deb and AppImage client bundles."
dependencies = ["bundle-linux-deb-release", "bundle-linux-appimage-release"]

[tasks.bundle-linux-deb-release]
description = "Build the Linux .deb client package."
dependencies = ["install-dioxus-cli", "check-release-version"]
command = "dx"
args = [
    "bundle",
    "--linux",
    "--package",
    "cheenhub_client",
    "--bin",
    "cheen_hub",
    "--release",
    "--no-default-features",
    "--features",
    "desktop,linux",
    "--package-types",
    "deb",
    "--out-dir",
    "${RELEASE_BUNDLE_OUT_DIR}/linux",
]

[tasks.bundle-linux-appimage-release]
description = "Build the Linux AppImage client package."
dependencies = ["install-dioxus-cli", "check-release-version"]
command = "dx"
args = [
    "bundle",
    "--linux",
    "--package",
    "cheenhub_client",
    "--bin",
    "cheen_hub",
    "--release",
    "--no-default-features",
    "--features",
    "desktop,linux",
    "--package-types",
    "appimage",
    "--out-dir",
    "${RELEASE_BUNDLE_OUT_DIR}/linux",
]

[tasks.bundle-android-apk-release]
description = "Build the Android APK client package."
dependencies = ["install-dioxus-cli", "check-release-version"]
command = "dx"
args = [
    "bundle",
    "--android",
    "--package",
    "cheenhub_client",
    "--bin",
    "cheen_hub",
    "--release",
    "--package-types",
    "apk",
    "--out-dir",
    "${RELEASE_BUNDLE_OUT_DIR}/android",
]

[tasks.microphone-worker-watch]
description = "Rebuild the microphone worker wasm artifact when worker-facing Rust changes."
dependencies = ["install-cargo-watch"]
command = "cargo"
args = [
    "watch",
    "--postpone",
    "-w",
    "crates/client/src/worker_lib.rs",
    "-w",
    "crates/client/src/workers",
    "-w",
    "crates/client/src/features/microphone/vad.rs",
    "-w",
    "crates/client/Cargo.toml",
    "-s",
    "cargo make build-microphone-worker-wasm",
]

[tasks.build-microphone-worker-wasm]
description = "Build the debug wasm artifact used by the browser microphone worker."
dependencies = [
    "ensure-wasm-target",
    "install-wasm-bindgen-cli",
    "prepare-microphone-worker-output",
    "cargo-build-microphone-worker-wasm",
    "bindgen-microphone-worker-wasm",
]

[tasks.build-microphone-worker-wasm-release]
description = "Build the release wasm artifact used by the browser microphone worker."
dependencies = [
    "ensure-wasm-target",
    "install-wasm-bindgen-cli",
    "prepare-microphone-worker-output",
    "cargo-build-microphone-worker-wasm-release",
    "bindgen-microphone-worker-wasm-release",
]

[tasks.ensure-wasm-target]
private = true
command = "rustup"
args = ["target", "add", "wasm32-unknown-unknown"]

[tasks.prepare-microphone-worker-output]
private = true
linux_alias = "prepare-microphone-worker-output-unix"
mac_alias = "prepare-microphone-worker-output-unix"
windows_alias = "prepare-microphone-worker-output-windows"

[tasks.prepare-microphone-worker-output-unix]
private = true
script = '''
mkdir -p "$MICROPHONE_WORKER_OUT_DIR"
'''

[tasks.prepare-microphone-worker-output-windows]
private = true
command = "powershell"
args = [
    "-NoProfile",
    "-ExecutionPolicy",
    "Bypass",
    "-Command",
    "New-Item -ItemType Directory -Force -Path $env:MICROPHONE_WORKER_OUT_DIR | Out-Null",
]

[tasks.cargo-build-microphone-worker-wasm]
private = true
command = "cargo"
args = [
    "build",
    "-p",
    "cheenhub_client",
    "--lib",
    "--target",
    "wasm32-unknown-unknown",
    "--no-default-features",
    "--features",
    "microphone_worker",
]

[tasks.cargo-build-microphone-worker-wasm-release]
private = true
command = "cargo"
args = [
    "build",
    "-p",
    "cheenhub_client",
    "--lib",
    "--target",
    "wasm32-unknown-unknown",
    "--no-default-features",
    "--features",
    "microphone_worker",
    "--release",
]

[tasks.bindgen-microphone-worker-wasm]
private = true
command = "wasm-bindgen"
args = [
    "target/wasm32-unknown-unknown/debug/cheenhub_client_worker.wasm",
    "--target",
    "web",
    "--out-dir",
    "${MICROPHONE_WORKER_OUT_DIR}",
    "--out-name",
    "microphone_worker",
]

[tasks.bindgen-microphone-worker-wasm-release]
private = true
command = "wasm-bindgen"
args = [
    "target/wasm32-unknown-unknown/release/cheenhub_client_worker.wasm",
    "--target",
    "web",
    "--out-dir",
    "${MICROPHONE_WORKER_OUT_DIR}",
    "--out-name",
    "microphone_worker",
]

[tasks.ensure-docker-desktop]
description = "Ensure Docker Desktop is running."
linux_alias = "ensure-docker-desktop-unix"
mac_alias = "ensure-docker-desktop-mac"
windows_alias = "ensure-docker-desktop-windows"

[tasks.ensure-docker-desktop-unix]
private = true
script = '''
if docker info >/dev/null 2>&1; then
    echo "Docker Desktop is already running."
    exit 0
fi

echo "Docker Desktop is not running; starting it..."
if command -v systemctl >/dev/null 2>&1; then
    systemctl --user start docker-desktop >/dev/null 2>&1 || true
fi
if ! docker info >/dev/null 2>&1 && command -v docker-desktop >/dev/null 2>&1; then
    nohup docker-desktop >/tmp/cheenhub-docker-desktop.log 2>&1 &
fi

attempt=1
while [ "$attempt" -le 90 ]; do
    if docker info >/dev/null 2>&1; then
        echo "Docker Desktop is ready."
        exit 0
    fi
    sleep 1
    attempt=$((attempt + 1))
done

echo "Docker Desktop did not become ready within 90 seconds." >&2
exit 1
'''

[tasks.ensure-docker-desktop-mac]
private = true
script = '''
if docker info >/dev/null 2>&1; then
    echo "Docker Desktop is already running."
    exit 0
fi

echo "Docker Desktop is not running; starting it..."
open -a Docker >/dev/null 2>&1 || true

attempt=1
while [ "$attempt" -le 90 ]; do
    if docker info >/dev/null 2>&1; then
        echo "Docker Desktop is ready."
        exit 0
    fi
    sleep 1
    attempt=$((attempt + 1))
done

echo "Docker Desktop did not become ready within 90 seconds." >&2
exit 1
'''

[tasks.ensure-docker-desktop-windows]
private = true
command = "powershell"
args = [
    "-NoProfile",
    "-ExecutionPolicy",
    "Bypass",
    "-Command",
    '''
docker info *> $null
if ($LASTEXITCODE -eq 0) {
    Write-Host "Docker Desktop is already running."
    exit 0
}

Write-Host "Docker Desktop is not running; starting it..."
$dockerDesktopPaths = @(
    "$env:ProgramFiles\Docker\Docker\Docker Desktop.exe",
    "$env:LOCALAPPDATA\Docker\Docker Desktop.exe"
)
$started = $false
foreach ($path in $dockerDesktopPaths) {
    if (Test-Path $path) {
        Start-Process -FilePath $path
        $started = $true
        break
    }
}
if (-not $started) {
    Write-Host "Docker Desktop executable was not found in the standard install paths."
}

for ($attempt = 1; $attempt -le 90; $attempt++) {
    docker info *> $null
    if ($LASTEXITCODE -eq 0) {
        Write-Host "Docker Desktop is ready."
        exit 0
    }
    Start-Sleep -Seconds 1
}

Write-Error "Docker Desktop did not become ready within 90 seconds."
exit 1
''',
]

[tasks.ensure-postgres]
description = "Ensure the local Postgres container exists, is running, and accepts connections."
dependencies = [
    "postgres-start-existing",
    "postgres-create-missing",
    "postgres-ready",
]

[tasks.postgres-start-existing]
private = true
ignore_errors = true
command = "docker"
args = ["start", "${POSTGRES_CONTAINER}"]

[tasks.postgres-create-missing]
private = true
ignore_errors = true
command = "docker"
args = [
    "run",
    "--name",
    "${POSTGRES_CONTAINER}",
    "-e",
    "POSTGRES_USER=${POSTGRES_USER}",
    "-e",
    "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}",
    "-e",
    "POSTGRES_DB=${POSTGRES_DB}",
    "-p",
    "${POSTGRES_PORT}:5432",
    "-v",
    "cheenhub-postgres-data:/var/lib/postgresql/data",
    "-d",
    "postgres:16",
]

[tasks.postgres-ready]
private = true
linux_alias = "postgres-ready-unix"
mac_alias = "postgres-ready-unix"
windows_alias = "postgres-ready-windows"

[tasks.postgres-ready-unix]
private = true
script = '''
attempt=1
while [ "$attempt" -le 60 ]; do
    if docker exec "$POSTGRES_CONTAINER" pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" >/dev/null 2>&1; then
        echo "Postgres is ready."
        exit 0
    fi
    sleep 1
    attempt=$((attempt + 1))
done

echo "Postgres did not become ready within 60 seconds." >&2
exit 1
'''

[tasks.postgres-ready-windows]
private = true
command = "powershell"
args = [
    "-NoProfile",
    "-ExecutionPolicy",
    "Bypass",
    "-Command",
    '''
for ($attempt = 1; $attempt -le 60; $attempt++) {
    docker exec $env:POSTGRES_CONTAINER pg_isready -U $env:POSTGRES_USER -d $env:POSTGRES_DB *> $null
    if ($LASTEXITCODE -eq 0) {
        Write-Host "Postgres is ready."
        exit 0
    }
    Start-Sleep -Seconds 1
}

Write-Error "Postgres did not become ready within 60 seconds."
exit 1
''',
]

[tasks.migrate-database]
description = "Run database migrations using local .env configuration."
env_files = [".env"]
command = "cargo"
args = ["run", "-p", "cheenhub_migrations", "--", "up"]

[tasks.fmt]
description = "Format Rust code."
command = "cargo"
args = ["fmt"]

[tasks.clippy-workspace]
description = "Run clippy for the full workspace."
command = "cargo"
args = ["clippy", "--workspace", "--all-targets"]

[tasks.test-workspace]
description = "Run all workspace tests."
command = "cargo"
args = ["test", "--workspace", "--all-targets"]

[tasks.verify]
description = "Run the standard local verification flow."
dependencies = ["fmt", "clippy-workspace", "test-workspace"]

[tasks.setup]
description = "Install local development command-line tools used by cargo-make tasks."
dependencies = ["install-cargo-watch", "install-dioxus-cli", "install-wasm-bindgen-cli"]

[tasks.install-cargo-watch]
private = true
install_crate = { crate_name = "cargo-watch", binary = "cargo-watch", test_arg = "--version", version = "8.5.3" }

[tasks.install-dioxus-cli]
private = true
install_crate = { crate_name = "dioxus-cli", binary = "dx", test_arg = "--version", version = "0.7.5" }

[tasks.install-wasm-bindgen-cli]
private = true
install_crate = { crate_name = "wasm-bindgen-cli", binary = "wasm-bindgen", test_arg = "--version", version = "0.2.120" }

[tasks.check-release-version]
description = "Check that every package uses the workspace release version."
command = "cargo"
args = ["run", "-p", "xtask", "--", "release-version", "check"]

[tasks.print-release-tag]
description = "Print the git tag derived from the workspace release version."
command = "cargo"
args = ["run", "-p", "xtask", "--", "release-version", "print-tag"]

[tasks.create-git-tag]
description = "Create the git tag derived from the workspace release version."
command = "cargo"
args = ["run", "-p", "xtask", "--", "release-version", "tag"]
