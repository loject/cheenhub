name: Release Docker images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CHEENHUB_DOMAIN: ${{ vars.CHEENHUB_DOMAIN || 'cheenhub.ru' }}
  CHEENHUB_API_BASE_URL: ${{ vars.CHEENHUB_API_BASE_URL || 'https://cheenhub.ru/api' }}
  CHEENHUB_REALTIME_URL: ${{ vars.CHEENHUB_REALTIME_URL || 'https://cheenhub.ru/realtime' }}
  CHEENHUB_REALTIME_CERT_SHA256: ${{ vars.CHEENHUB_REALTIME_CERT_SHA256 || '' }}
  CHEENHUB_JWT_KEY_ID: ${{ vars.CHEENHUB_JWT_KEY_ID || 'prod-ed25519-1' }}
  CHEENHUB_JWT_PUBLIC_KEY_BASE64: ${{ vars.CHEENHUB_JWT_PUBLIC_KEY_BASE64 || '' }}

jobs:
  prepare:
    name: Prepare image release
    runs-on: ubuntu-24.04
    outputs:
      backend-image: ${{ steps.images.outputs.backend }}
      web-image: ${{ steps.images.outputs.web }}
      app-version: ${{ steps.app-version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve image names
        id: images
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "backend=ghcr.io/${repo}/backend" >> "$GITHUB_OUTPUT"
          echo "web=ghcr.io/${repo}/web" >> "$GITHUB_OUTPUT"

      - name: Resolve app version
        id: app-version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME}"
          else
            crate_version="$(sed -n 's/^version = "\(.*\)"/\1/p' crates/client/Cargo.toml | head -n 1)"
            version="v${crate_version}-${GITHUB_SHA::7}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Validate release configuration
        shell: bash
        run: |
          if [[ -z "${CHEENHUB_JWT_PUBLIC_KEY_BASE64}" ]]; then
            echo "CHEENHUB_JWT_PUBLIC_KEY_BASE64 repository variable is required for production frontend builds." >&2
            exit 1
          fi

  build-backend:
    name: Build and push backend image
    runs-on: ubuntu-24.04
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Backend image metadata
        id: backend-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.prepare.outputs.backend-image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: backend-runtime
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ needs.prepare.outputs.backend-image }}:buildcache
            type=registry,ref=${{ needs.prepare.outputs.web-image }}:buildcache
          cache-to: type=registry,ref=${{ needs.prepare.outputs.backend-image }}:buildcache,mode=max

  build-web:
    name: Build and push web image
    runs-on: ubuntu-24.04
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Web image metadata
        id: web-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.prepare.outputs.web-image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: web-runtime
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}
          build-args: |
            CHEENHUB_API_BASE_URL=${{ env.CHEENHUB_API_BASE_URL }}
            CHEENHUB_APP_VERSION=${{ needs.prepare.outputs.app-version }}
            CHEENHUB_JWT_KEY_ID=${{ env.CHEENHUB_JWT_KEY_ID }}
            CHEENHUB_JWT_PUBLIC_KEY_BASE64=${{ env.CHEENHUB_JWT_PUBLIC_KEY_BASE64 }}
            CHEENHUB_REALTIME_URL=${{ env.CHEENHUB_REALTIME_URL }}
            CHEENHUB_REALTIME_CERT_SHA256=${{ env.CHEENHUB_REALTIME_CERT_SHA256 }}
          cache-from: |
            type=registry,ref=${{ needs.prepare.outputs.web-image }}:buildcache
            type=registry,ref=${{ needs.prepare.outputs.backend-image }}:buildcache
          cache-to: type=registry,ref=${{ needs.prepare.outputs.web-image }}:buildcache,mode=max

  publish-release:
    name: Publish release artifacts
    runs-on: ubuntu-24.04
    needs:
      - prepare
      - build-backend
      - build-web
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export release image archives
        shell: bash
        run: |
          mkdir -p dist
          docker pull "${{ needs.prepare.outputs.backend-image }}:${GITHUB_REF_NAME}"
          docker pull "${{ needs.prepare.outputs.web-image }}:${GITHUB_REF_NAME}"
          docker save "${{ needs.prepare.outputs.backend-image }}:${GITHUB_REF_NAME}" | gzip -9 > "dist/cheenhub-backend-${GITHUB_REF_NAME}.docker-image.tar.gz"
          docker save "${{ needs.prepare.outputs.web-image }}:${GITHUB_REF_NAME}" | gzip -9 > "dist/cheenhub-web-${GITHUB_REF_NAME}.docker-image.tar.gz"

      - name: Create or update GitHub release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          notes="Docker images:
          - ${{ needs.prepare.outputs.backend-image }}:${GITHUB_REF_NAME}
          - ${{ needs.prepare.outputs.web-image }}:${GITHUB_REF_NAME}"

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.docker-image.tar.gz --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.docker-image.tar.gz --title "$GITHUB_REF_NAME" --notes "$notes"
          fi
