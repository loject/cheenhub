name: Release artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUST_TOOLCHAIN: "1.92.0"
  DIOXUS_CLI_VERSION: "0.7.5"
  ANDROID_BUILD_TOOLS_VERSION: "35.0.0"
  ANDROID_NDK_VERSION: "27.2.12479018"
  CHEENHUB_DOMAIN: ${{ vars.CHEENHUB_DOMAIN || 'cheenhub.ru' }}
  CHEENHUB_API_BASE_URL: ${{ vars.CHEENHUB_API_BASE_URL || 'https://cheenhub.ru/api' }}
  CHEENHUB_REALTIME_URL: ${{ vars.CHEENHUB_REALTIME_URL || 'https://cheenhub.ru/realtime' }}
  CHEENHUB_REALTIME_CERT_SHA256: ${{ vars.CHEENHUB_REALTIME_CERT_SHA256 || '' }}
  CHEENHUB_JWT_KEY_ID: ${{ vars.CHEENHUB_JWT_KEY_ID || 'prod-ed25519-1' }}
  CHEENHUB_JWT_PUBLIC_KEY_BASE64: ${{ vars.CHEENHUB_JWT_PUBLIC_KEY_BASE64 || '' }}

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-24.04
    outputs:
      backend-image: ${{ steps.images.outputs.backend }}
      web-image: ${{ steps.images.outputs.web }}
      app-version: ${{ steps.app-version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve image names
        id: images
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "backend=ghcr.io/${repo}/backend" >> "$GITHUB_OUTPUT"
          echo "web=ghcr.io/${repo}/web" >> "$GITHUB_OUTPUT"

      - name: Resolve app version
        id: app-version
        shell: bash
        run: |
          release_tag="$(cargo run --quiet -p xtask -- release-version print-tag)"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${release_tag}"
            if [[ "${GITHUB_REF_NAME}" != "${release_tag}" ]]; then
              echo "Release tag ${GITHUB_REF_NAME} must match workspace version ${release_tag}." >&2
              exit 1
            fi
          else
            version="${release_tag}-${GITHUB_SHA::7}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Validate release configuration
        shell: bash
        run: |
          if [[ -z "${CHEENHUB_JWT_PUBLIC_KEY_BASE64}" ]]; then
            echo "CHEENHUB_JWT_PUBLIC_KEY_BASE64 repository variable is required for production frontend builds." >&2
            exit 1
          fi

  build-backend:
    name: Build and push backend image
    runs-on: ubuntu-24.04
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Backend image metadata
        id: backend-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.prepare.outputs.backend-image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: backend-runtime
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ needs.prepare.outputs.backend-image }}:buildcache
            type=registry,ref=${{ needs.prepare.outputs.web-image }}:buildcache
          cache-to: type=registry,ref=${{ needs.prepare.outputs.backend-image }}:buildcache,mode=max

      - name: Export backend release image archive
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          mkdir -p dist/backend
          docker pull "${{ needs.prepare.outputs.backend-image }}:${GITHUB_REF_NAME}"
          docker save "${{ needs.prepare.outputs.backend-image }}:${GITHUB_REF_NAME}" | gzip -9 > "dist/backend/cheenhub-backend-${GITHUB_REF_NAME}.docker-image.tar.gz"

      - name: Publish backend release archive
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: cargo run --quiet -p xtask -- release-artifacts publish "${GITHUB_REF_NAME}" dist/backend

  build-web:
    name: Build and push web image
    runs-on: ubuntu-24.04
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Web image metadata
        id: web-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.prepare.outputs.web-image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: web-runtime
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}
          build-args: |
            CHEENHUB_API_BASE_URL=${{ env.CHEENHUB_API_BASE_URL }}
            CHEENHUB_APP_VERSION=${{ needs.prepare.outputs.app-version }}
            CHEENHUB_JWT_KEY_ID=${{ env.CHEENHUB_JWT_KEY_ID }}
            CHEENHUB_JWT_PUBLIC_KEY_BASE64=${{ env.CHEENHUB_JWT_PUBLIC_KEY_BASE64 }}
            CHEENHUB_REALTIME_URL=${{ env.CHEENHUB_REALTIME_URL }}
            CHEENHUB_REALTIME_CERT_SHA256=${{ env.CHEENHUB_REALTIME_CERT_SHA256 }}
          cache-from: |
            type=registry,ref=${{ needs.prepare.outputs.web-image }}:buildcache
            type=registry,ref=${{ needs.prepare.outputs.backend-image }}:buildcache
          cache-to: type=registry,ref=${{ needs.prepare.outputs.web-image }}:buildcache,mode=max

      - name: Export web release image archive
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          mkdir -p dist/web
          docker pull "${{ needs.prepare.outputs.web-image }}:${GITHUB_REF_NAME}"
          docker save "${{ needs.prepare.outputs.web-image }}:${GITHUB_REF_NAME}" | gzip -9 > "dist/web/cheenhub-web-${GITHUB_REF_NAME}.docker-image.tar.gz"

      - name: Publish web release archive
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: cargo run --quiet -p xtask -- release-artifacts publish "${GITHUB_REF_NAME}" dist/web

  build-windows-client:
    name: Build Windows client installers
    runs-on: windows-2025
    needs: prepare
    if: startsWith(github.ref, 'refs/tags/')
    env:
      CHEENHUB_APP_VERSION: ${{ needs.prepare.outputs.app-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install $env:RUST_TOOLCHAIN --profile minimal
          rustup default $env:RUST_TOOLCHAIN

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-client-release
          cache-on-failure: true
          workspaces: |
            . -> target

      - name: Cache Dioxus CLI
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/dx
            ~/.cargo/bin/dx.exe
          key: ${{ runner.os }}-dioxus-cli-${{ env.DIOXUS_CLI_VERSION }}

      - name: Install Dioxus CLI
        shell: pwsh
        run: |
          $dx = Get-Command dx -ErrorAction SilentlyContinue
          $expected = [regex]::Escape("dioxus $env:DIOXUS_CLI_VERSION")
          if ($dx -and ((dx --version) -match $expected)) {
            dx --version
          } else {
            cargo install dioxus-cli --version $env:DIOXUS_CLI_VERSION --locked
          }

      - name: Validate release version
        shell: pwsh
        run: cargo run --quiet -p xtask -- release-version check

      - name: Build Windows installers
        shell: pwsh
        run: |
          dx bundle --windows --package cheenhub_client --bin cheen_hub --release --package-types nsis --package-types msi --out-dir dist/windows/raw
          $payload = Get-ChildItem -Path dist/windows/raw -Recurse -Filter *.exe | Sort-Object FullName | Select-Object -First 1
          if (-not $payload) {
            throw "Dioxus Windows NSIS installer was not found in dist/windows/raw."
          }
          $env:CHEENHUB_INSTALLER_PAYLOAD = $payload.FullName
          $env:CHEENHUB_INSTALLER_PAYLOAD_NAME = $payload.Name
          cargo build -p cheenhub_client --bin cheenhub_installer --release --no-default-features --features desktop
          New-Item -ItemType Directory -Force dist/windows/installer | Out-Null
          Copy-Item target/release/cheenhub_installer.exe dist/windows/installer/cheenhub-installer.exe

      - name: Normalize Windows release assets
        shell: pwsh
        run: |
          cargo run --quiet -p xtask -- release-artifacts collect windows dist/windows/installer dist/client $env:GITHUB_REF_NAME

      - name: Publish Windows release assets
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: cargo run --quiet -p xtask -- release-artifacts publish $env:GITHUB_REF_NAME dist/client

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v6
        with:
          name: client-release-windows
          path: dist/client/*
          if-no-files-found: error

  build-linux-client:
    name: Build Linux client packages
    runs-on: ubuntu-24.04
    needs: prepare
    if: startsWith(github.ref, 'refs/tags/')
    env:
      CHEENHUB_APP_VERSION: ${{ needs.prepare.outputs.app-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux bundle dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libfuse2t64 \
            libglib2.0-dev \
            libgtk-3-dev \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup default "${RUST_TOOLCHAIN}"

      - name: Cache Cargo downloads and Dioxus CLI
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/dx
            ~/.cargo/bin/dx.exe
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-dioxus-${{ env.DIOXUS_CLI_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-dioxus-${{ env.DIOXUS_CLI_VERSION }}-
            ${{ runner.os }}-cargo-dioxus-

      - name: Install Dioxus CLI
        shell: bash
        run: |
          if command -v dx >/dev/null 2>&1 && dx --version | grep -F "dioxus ${DIOXUS_CLI_VERSION}" >/dev/null; then
            dx --version
          else
            cargo install dioxus-cli --version "${DIOXUS_CLI_VERSION}" --locked
          fi

      - name: Validate release version
        shell: bash
        run: cargo run --quiet -p xtask -- release-version check

      - name: Build Linux packages
        shell: bash
        run: |
          dx bundle --linux --package cheenhub_client --bin cheen_hub --release --package-types deb --package-types appimage --out-dir dist/linux/raw

      - name: Normalize Linux release assets
        shell: bash
        run: |
          cargo run --quiet -p xtask -- release-artifacts collect linux dist/linux/raw dist/client "${GITHUB_REF_NAME}"

      - name: Publish Linux release assets
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: cargo run --quiet -p xtask -- release-artifacts publish "${GITHUB_REF_NAME}" dist/client

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v6
        with:
          name: client-release-linux
          path: dist/client/*
          if-no-files-found: error

  build-android-client:
    name: Build Android client APK
    runs-on: ubuntu-24.04
    needs: prepare
    if: startsWith(github.ref, 'refs/tags/')
    env:
      CHEENHUB_APP_VERSION: ${{ needs.prepare.outputs.app-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager \
            "platforms;android-35" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}"
          ndk_path="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ndk_path}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK_ROOT=${ndk_path}" >> "${GITHUB_ENV}"

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup default "${RUST_TOOLCHAIN}"
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android

      - name: Cache Cargo downloads and Dioxus CLI
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/dx
            ~/.cargo/bin/dx.exe
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-dioxus-${{ env.DIOXUS_CLI_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-dioxus-${{ env.DIOXUS_CLI_VERSION }}-
            ${{ runner.os }}-cargo-dioxus-

      - name: Install Dioxus CLI
        shell: bash
        run: |
          if command -v dx >/dev/null 2>&1 && dx --version | grep -F "dioxus ${DIOXUS_CLI_VERSION}" >/dev/null; then
            dx --version
          else
            cargo install dioxus-cli --version "${DIOXUS_CLI_VERSION}" --locked
          fi

      - name: Configure Android release signing
        env:
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
        shell: bash
        run: |
          signing_keystore_dir="${GITHUB_WORKSPACE}/target/android-signing"
          mkdir -p "${signing_keystore_dir}"

          missing_secrets=()
          has_signing_secret=false
          for secret_name in \
            ANDROID_RELEASE_KEYSTORE_BASE64 \
            ANDROID_RELEASE_KEYSTORE_PASSWORD \
            ANDROID_RELEASE_KEY_ALIAS \
            ANDROID_RELEASE_KEY_PASSWORD
          do
            if [[ -n "${!secret_name}" ]]; then
              has_signing_secret=true
            else
              missing_secrets+=("${secret_name}")
            fi
          done

          if [[ "${has_signing_secret}" == "true" && "${#missing_secrets[@]}" -gt 0 ]]; then
            echo "Android release signing secrets are partially configured. Missing: ${missing_secrets[*]}." >&2
            exit 1
          fi

          if [[ "${has_signing_secret}" == "true" ]]; then
            signing_keystore_path="${signing_keystore_dir}/release.jks"
            signing_keystore_password="${ANDROID_RELEASE_KEYSTORE_PASSWORD}"
            signing_key_alias="${ANDROID_RELEASE_KEY_ALIAS}"
            signing_key_password="${ANDROID_RELEASE_KEY_PASSWORD}"
            printf '%s' "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${signing_keystore_path}"
          else
            echo "::warning::Android release signing secrets are not configured; generating a temporary CI keystore. APK updates will require reinstalling unless stable ANDROID_RELEASE_* secrets are added."
            signing_keystore_path="${signing_keystore_dir}/ci-release.jks"
            signing_keystore_password="cheenhub-ci-release-store"
            signing_key_alias="cheenhub-ci-release"
            signing_key_password="cheenhub-ci-release-key"
            keytool -genkeypair \
              -noprompt \
              -keystore "${signing_keystore_path}" \
              -storepass "${signing_keystore_password}" \
              -keypass "${signing_key_password}" \
              -alias "${signing_key_alias}" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storetype JKS \
              -dname "CN=CheenHub CI, OU=CI, O=CheenHub, L=Novosibirsk, ST=Novosibirsk, C=RU"
          fi

          chmod 600 "${signing_keystore_path}"

          export ANDROID_SIGNING_KEYSTORE_PATH="${signing_keystore_path}"
          export ANDROID_SIGNING_KEYSTORE_PASSWORD="${signing_keystore_password}"
          export ANDROID_SIGNING_KEY_ALIAS="${signing_key_alias}"
          export ANDROID_SIGNING_KEY_PASSWORD="${signing_key_password}"

          python3 - <<'PY'
          import json
          import os

          with open("Dioxus.toml", "a", encoding="utf-8") as config:
              config.write("\n[android.signing]\n")
              config.write(f"jks_file = {json.dumps(os.environ['ANDROID_SIGNING_KEYSTORE_PATH'])}\n")
              config.write(f"jks_password = {json.dumps(os.environ['ANDROID_SIGNING_KEYSTORE_PASSWORD'])}\n")
              config.write(f"key_alias = {json.dumps(os.environ['ANDROID_SIGNING_KEY_ALIAS'])}\n")
              config.write(f"key_password = {json.dumps(os.environ['ANDROID_SIGNING_KEY_PASSWORD'])}\n")
          PY

      - name: Validate release version
        shell: bash
        run: cargo run --quiet -p xtask -- release-version check

      - name: Build APK package
        shell: bash
        run: |
          dx bundle --android --package cheenhub_client --bin cheen_hub --release --package-types apk --out-dir dist/android/raw

      - name: Normalize Android release asset
        shell: bash
        run: |
          cargo run --quiet -p xtask -- release-artifacts collect android dist/android/raw dist/client "${GITHUB_REF_NAME}"

      - name: Publish Android release asset
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: cargo run --quiet -p xtask -- release-artifacts publish "${GITHUB_REF_NAME}" dist/client

      - name: Upload Android release asset
        uses: actions/upload-artifact@v6
        with:
          name: client-release-android
          path: dist/client/*
          if-no-files-found: error
