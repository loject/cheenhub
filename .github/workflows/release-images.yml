name: Release artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUST_TOOLCHAIN: "1.92.0"
  DIOXUS_CLI_VERSION: "0.7.5"
  ANDROID_BUILD_TOOLS_VERSION: "35.0.0"
  ANDROID_NDK_VERSION: "27.2.12479018"
  CHEENHUB_DOMAIN: ${{ vars.CHEENHUB_DOMAIN || 'cheenhub.ru' }}
  CHEENHUB_API_BASE_URL: ${{ vars.CHEENHUB_API_BASE_URL || 'https://cheenhub.ru/api' }}
  CHEENHUB_REALTIME_URL: ${{ vars.CHEENHUB_REALTIME_URL || 'https://cheenhub.ru/realtime' }}
  CHEENHUB_REALTIME_CERT_SHA256: ${{ vars.CHEENHUB_REALTIME_CERT_SHA256 || '' }}
  CHEENHUB_JWT_KEY_ID: ${{ vars.CHEENHUB_JWT_KEY_ID || 'prod-ed25519-1' }}
  CHEENHUB_JWT_PUBLIC_KEY_BASE64: ${{ vars.CHEENHUB_JWT_PUBLIC_KEY_BASE64 || '' }}

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-24.04
    outputs:
      backend-image: ${{ steps.images.outputs.backend }}
      web-image: ${{ steps.images.outputs.web }}
      app-version: ${{ steps.app-version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve image names
        id: images
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "backend=ghcr.io/${repo}/backend" >> "$GITHUB_OUTPUT"
          echo "web=ghcr.io/${repo}/web" >> "$GITHUB_OUTPUT"

      - name: Resolve app version
        id: app-version
        shell: bash
        run: |
          release_tag="$(cargo run --quiet -p xtask -- release-version print-tag)"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${release_tag}"
            if [[ "${GITHUB_REF_NAME}" != "${release_tag}" ]]; then
              echo "Release tag ${GITHUB_REF_NAME} must match workspace version ${release_tag}." >&2
              exit 1
            fi
          else
            version="${release_tag}-${GITHUB_SHA::7}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Validate release configuration
        shell: bash
        run: |
          if [[ -z "${CHEENHUB_JWT_PUBLIC_KEY_BASE64}" ]]; then
            echo "CHEENHUB_JWT_PUBLIC_KEY_BASE64 repository variable is required for production frontend builds." >&2
            exit 1
          fi

  build-backend:
    name: Build and push backend image
    runs-on: ubuntu-24.04
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Backend image metadata
        id: backend-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.prepare.outputs.backend-image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: backend-runtime
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ needs.prepare.outputs.backend-image }}:buildcache
            type=registry,ref=${{ needs.prepare.outputs.web-image }}:buildcache
          cache-to: type=registry,ref=${{ needs.prepare.outputs.backend-image }}:buildcache,mode=max

  build-web:
    name: Build and push web image
    runs-on: ubuntu-24.04
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Web image metadata
        id: web-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.prepare.outputs.web-image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: web-runtime
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}
          build-args: |
            CHEENHUB_API_BASE_URL=${{ env.CHEENHUB_API_BASE_URL }}
            CHEENHUB_APP_VERSION=${{ needs.prepare.outputs.app-version }}
            CHEENHUB_JWT_KEY_ID=${{ env.CHEENHUB_JWT_KEY_ID }}
            CHEENHUB_JWT_PUBLIC_KEY_BASE64=${{ env.CHEENHUB_JWT_PUBLIC_KEY_BASE64 }}
            CHEENHUB_REALTIME_URL=${{ env.CHEENHUB_REALTIME_URL }}
            CHEENHUB_REALTIME_CERT_SHA256=${{ env.CHEENHUB_REALTIME_CERT_SHA256 }}
          cache-from: |
            type=registry,ref=${{ needs.prepare.outputs.web-image }}:buildcache
            type=registry,ref=${{ needs.prepare.outputs.backend-image }}:buildcache
          cache-to: type=registry,ref=${{ needs.prepare.outputs.web-image }}:buildcache,mode=max

  build-windows-client:
    name: Build Windows client installers
    runs-on: windows-2025
    needs: prepare
    if: startsWith(github.ref, 'refs/tags/')
    env:
      CHEENHUB_APP_VERSION: ${{ needs.prepare.outputs.app-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install $env:RUST_TOOLCHAIN --profile minimal
          rustup default $env:RUST_TOOLCHAIN

      - name: Install Dioxus CLI
        shell: pwsh
        run: cargo install dioxus-cli --version $env:DIOXUS_CLI_VERSION --locked

      - name: Validate release version
        shell: pwsh
        run: cargo run --quiet -p xtask -- release-version check

      - name: Build NSIS installer
        shell: pwsh
        run: |
          dx bundle --windows --package cheenhub_client --release --package-types nsis --out-dir dist/windows/raw

      - name: Build MSI installer
        shell: pwsh
        run: |
          dx bundle --windows --package cheenhub_client --release --package-types msi --out-dir dist/windows/raw

      - name: Normalize Windows release assets
        shell: pwsh
        run: |
          cargo run --quiet -p xtask -- release-artifacts collect windows dist/windows/raw dist/client $env:GITHUB_REF_NAME

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v5
        with:
          name: client-release-windows
          path: dist/client/*
          if-no-files-found: error

  build-linux-client:
    name: Build Linux client packages
    runs-on: ubuntu-24.04
    needs: prepare
    if: startsWith(github.ref, 'refs/tags/')
    env:
      CHEENHUB_APP_VERSION: ${{ needs.prepare.outputs.app-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux bundle dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libfuse2t64 \
            libglib2.0-dev \
            libgtk-3-dev \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup default "${RUST_TOOLCHAIN}"

      - name: Install Dioxus CLI
        shell: bash
        run: cargo install dioxus-cli --version "${DIOXUS_CLI_VERSION}" --locked

      - name: Validate release version
        shell: bash
        run: cargo run --quiet -p xtask -- release-version check

      - name: Build deb package
        shell: bash
        run: |
          dx bundle --linux --package cheenhub_client --release --package-types deb --out-dir dist/linux/raw

      - name: Build AppImage package
        shell: bash
        run: |
          dx bundle --linux --package cheenhub_client --release --package-types appimage --out-dir dist/linux/raw

      - name: Normalize Linux release assets
        shell: bash
        run: |
          cargo run --quiet -p xtask -- release-artifacts collect linux dist/linux/raw dist/client "${GITHUB_REF_NAME}"

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v5
        with:
          name: client-release-linux
          path: dist/client/*
          if-no-files-found: error

  build-android-client:
    name: Build Android client APK
    runs-on: ubuntu-24.04
    needs: prepare
    if: startsWith(github.ref, 'refs/tags/')
    env:
      CHEENHUB_APP_VERSION: ${{ needs.prepare.outputs.app-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager \
            "platforms;android-35" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}"
          ndk_path="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ndk_path}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK_ROOT=${ndk_path}" >> "${GITHUB_ENV}"

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup default "${RUST_TOOLCHAIN}"
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android

      - name: Install Dioxus CLI
        shell: bash
        run: cargo install dioxus-cli --version "${DIOXUS_CLI_VERSION}" --locked

      - name: Configure Android release signing
        env:
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
        shell: bash
        run: |
          if [[ -z "${ANDROID_RELEASE_KEYSTORE_BASE64}" || -z "${ANDROID_RELEASE_KEYSTORE_PASSWORD}" || -z "${ANDROID_RELEASE_KEY_ALIAS}" || -z "${ANDROID_RELEASE_KEY_PASSWORD}" ]]; then
            echo "ANDROID_RELEASE_KEYSTORE_BASE64, ANDROID_RELEASE_KEYSTORE_PASSWORD, ANDROID_RELEASE_KEY_ALIAS, and ANDROID_RELEASE_KEY_PASSWORD secrets are required to build a release APK." >&2
            exit 1
          fi

          mkdir -p target/android-signing
          printf '%s' "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > target/android-signing/release.jks
          chmod 600 target/android-signing/release.jks

          python3 - <<'PY'
          import json
          import os

          with open("Dioxus.toml", "a", encoding="utf-8") as config:
              config.write("\n[android.signing]\n")
              config.write("jks_file = \"target/android-signing/release.jks\"\n")
              config.write(f"jks_password = {json.dumps(os.environ['ANDROID_RELEASE_KEYSTORE_PASSWORD'])}\n")
              config.write(f"key_alias = {json.dumps(os.environ['ANDROID_RELEASE_KEY_ALIAS'])}\n")
              config.write(f"key_password = {json.dumps(os.environ['ANDROID_RELEASE_KEY_PASSWORD'])}\n")
          PY

      - name: Validate release version
        shell: bash
        run: cargo run --quiet -p xtask -- release-version check

      - name: Build APK package
        shell: bash
        run: |
          dx bundle --android --package cheenhub_client --release --package-types apk --out-dir dist/android/raw

      - name: Normalize Android release asset
        shell: bash
        run: |
          cargo run --quiet -p xtask -- release-artifacts collect android dist/android/raw dist/client "${GITHUB_REF_NAME}"

      - name: Upload Android release asset
        uses: actions/upload-artifact@v5
        with:
          name: client-release-android
          path: dist/client/*
          if-no-files-found: error

  publish-release:
    name: Publish release artifacts
    runs-on: ubuntu-24.04
    needs:
      - prepare
      - build-backend
      - build-web
      - build-windows-client
      - build-linux-client
      - build-android-client
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download client release assets
        uses: actions/download-artifact@v5
        with:
          pattern: client-release-*
          path: dist
          merge-multiple: true

      - name: Export release image archives
        shell: bash
        run: |
          mkdir -p dist
          docker pull "${{ needs.prepare.outputs.backend-image }}:${GITHUB_REF_NAME}"
          docker pull "${{ needs.prepare.outputs.web-image }}:${GITHUB_REF_NAME}"
          docker save "${{ needs.prepare.outputs.backend-image }}:${GITHUB_REF_NAME}" | gzip -9 > "dist/cheenhub-backend-${GITHUB_REF_NAME}.docker-image.tar.gz"
          docker save "${{ needs.prepare.outputs.web-image }}:${GITHUB_REF_NAME}" | gzip -9 > "dist/cheenhub-web-${GITHUB_REF_NAME}.docker-image.tar.gz"

      - name: Create or update GitHub release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          notes="Docker images:
          - ${{ needs.prepare.outputs.backend-image }}:${GITHUB_REF_NAME}
          - ${{ needs.prepare.outputs.web-image }}:${GITHUB_REF_NAME}

          Client installers are attached to this release."

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --notes "$notes"
          fi
