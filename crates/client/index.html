<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <meta
      name="description"
      content="CheenHub — голосовой чат и совместное пространство для команд."
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>{app_title}</title>
    <script defer src="/pwa-register.js"></script>
  </head>
  <body>
    <section
      id="pwa-offline-fallback"
      aria-live="polite"
      aria-hidden="true"
      hidden
    >
      <style>
        #pwa-offline-fallback {
          position: fixed;
          inset: 0;
          z-index: 2147483647;
          display: grid;
          place-items: center;
          padding: 24px;
          background-color: #09090b;
          background-image:
            linear-gradient(to right, rgba(255, 255, 255, 0.028) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(255, 255, 255, 0.028) 1px, transparent 1px);
          background-size: 28px 28px;
          color: #f4f4f5;
          font-family:
            Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
            "Segoe UI", sans-serif;
        }

        #pwa-offline-fallback[hidden] {
          display: none;
        }

        .pwa-offline-panel {
          width: min(100%, 460px);
          border: 1px solid rgba(39, 39, 42, 0.95);
          border-radius: 16px;
          padding: 24px;
          background: rgba(24, 24, 27, 0.92);
          box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        }

        .pwa-offline-kicker {
          margin: 0 0 10px;
          color: #71717a;
          font-size: 10px;
          font-weight: 600;
          letter-spacing: 0;
          text-transform: uppercase;
        }

        .pwa-offline-title {
          margin: 0;
          font-size: 24px;
          font-weight: 650;
          line-height: 1.18;
          letter-spacing: 0;
        }

        .pwa-offline-copy {
          margin: 14px 0 0;
          color: #a1a1aa;
          font-size: 13px;
          line-height: 1.65;
        }

        .pwa-offline-actions {
          display: flex;
          flex-wrap: wrap;
          gap: 12px;
          margin-top: 24px;
        }

        .pwa-offline-button {
          min-height: 44px;
          border: 0;
          border-radius: 12px;
          padding: 0 18px;
          background: #3b82f6;
          color: #ffffff;
          cursor: pointer;
          font: inherit;
          font-size: 13px;
          font-weight: 650;
          transition:
            background 0.15s,
            box-shadow 0.15s;
        }

        .pwa-offline-button:hover {
          background: #60a5fa;
          box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
        }

        .pwa-offline-button:focus-visible {
          outline: 3px solid rgba(59, 130, 246, 0.38);
          outline-offset: 3px;
        }

        .pwa-offline-status {
          align-self: center;
          min-width: 0;
          color: #71717a;
          font-size: 12px;
        }

        @media (max-width: 520px) {
          #pwa-offline-fallback {
            padding: 16px;
          }

          .pwa-offline-panel {
            padding: 22px;
          }

          .pwa-offline-title {
            font-size: 23px;
          }
        }
      </style>
      <div class="pwa-offline-panel" role="status">
        <p class="pwa-offline-kicker">Нет соединения</p>
        <h1 class="pwa-offline-title">CheenHub запущен без интернета</h1>
        <p class="pwa-offline-copy">
          Мы сохранили оболочку приложения на устройстве. Голос, сообщения,
          медиа и синхронизация продолжатся после восстановления соединения.
        </p>
        <div class="pwa-offline-actions">
          <button
            class="pwa-offline-button"
            id="pwa-offline-retry"
            type="button"
          >
            Проверить соединение
          </button>
          <span class="pwa-offline-status" id="pwa-offline-status">
            Ожидаем сеть
          </span>
        </div>
      </div>
    </section>
    <div id="main"></div>
  </body>
</html>
