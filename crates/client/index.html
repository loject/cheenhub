<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <meta
      name="description"
      content="CheenHub — голосовой чат и совместное пространство для команд."
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>{app_title}</title>
    <script defer src="/pwa-register.js"></script>
  </head>
  <body>
    <section
      id="pwa-offline-fallback"
      aria-live="polite"
      aria-hidden="true"
      hidden
    >
      <style>
        #pwa-offline-fallback {
          position: fixed;
          inset: 0;
          z-index: 2147483647;
          display: grid;
          place-items: center;
          padding: 24px;
          background:
            radial-gradient(circle at 20% 0%, rgba(37, 99, 235, 0.20), transparent 32rem),
            linear-gradient(135deg, #111827 0%, #172033 44%, #0f172a 100%);
          color: #f8fafc;
          font-family:
            Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
            "Segoe UI", sans-serif;
        }

        #pwa-offline-fallback[hidden] {
          display: none;
        }

        .pwa-offline-panel {
          width: min(100%, 460px);
          border: 1px solid rgba(148, 163, 184, 0.28);
          border-radius: 8px;
          padding: 28px;
          background: rgba(15, 23, 42, 0.86);
          box-shadow: 0 24px 70px rgba(2, 6, 23, 0.38);
        }

        .pwa-offline-kicker {
          margin: 0 0 10px;
          color: #93c5fd;
          font-size: 13px;
          font-weight: 700;
          letter-spacing: 0;
          text-transform: uppercase;
        }

        .pwa-offline-title {
          margin: 0;
          font-size: 28px;
          line-height: 1.12;
          letter-spacing: 0;
        }

        .pwa-offline-copy {
          margin: 14px 0 0;
          color: #cbd5e1;
          font-size: 15px;
          line-height: 1.55;
        }

        .pwa-offline-actions {
          display: flex;
          flex-wrap: wrap;
          gap: 12px;
          margin-top: 24px;
        }

        .pwa-offline-button {
          min-height: 44px;
          border: 0;
          border-radius: 8px;
          padding: 0 18px;
          background: #60a5fa;
          color: #08111f;
          cursor: pointer;
          font: inherit;
          font-weight: 800;
        }

        .pwa-offline-button:focus-visible {
          outline: 3px solid rgba(147, 197, 253, 0.76);
          outline-offset: 3px;
        }

        .pwa-offline-status {
          align-self: center;
          min-width: 0;
          color: #bfdbfe;
          font-size: 14px;
        }

        @media (max-width: 520px) {
          #pwa-offline-fallback {
            padding: 16px;
          }

          .pwa-offline-panel {
            padding: 22px;
          }

          .pwa-offline-title {
            font-size: 23px;
          }
        }
      </style>
      <div class="pwa-offline-panel" role="status">
        <p class="pwa-offline-kicker">Нет соединения</p>
        <h1 class="pwa-offline-title">CheenHub запущен без интернета</h1>
        <p class="pwa-offline-copy">
          Мы сохранили оболочку приложения на устройстве. Голос, сообщения,
          медиа и синхронизация продолжатся после восстановления соединения.
        </p>
        <div class="pwa-offline-actions">
          <button
            class="pwa-offline-button"
            id="pwa-offline-retry"
            type="button"
          >
            Проверить соединение
          </button>
          <span class="pwa-offline-status" id="pwa-offline-status">
            Ожидаем сеть
          </span>
        </div>
      </div>
    </section>
    <div id="main"></div>
  </body>
</html>
