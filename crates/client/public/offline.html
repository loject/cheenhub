<!doctype html>
<html lang="ru" data-pwa-offline-shell="true">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>CheenHub — нет соединения</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <script defer src="/pwa-register.js"></script>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
        background-color: #09090b;
        background-image:
          linear-gradient(to right, rgba(255, 255, 255, 0.028) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.028) 1px, transparent 1px);
        background-size: 28px 28px;
        color: #f4f4f5;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 460px);
        border: 1px solid rgba(39, 39, 42, 0.95);
        border-radius: 16px;
        padding: 24px;
        background: rgba(24, 24, 27, 0.92);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      }

      p:first-child {
        margin: 0 0 10px;
        color: #71717a;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 650;
        line-height: 1.18;
        letter-spacing: 0;
      }

      p {
        margin: 14px 0 0;
        color: #a1a1aa;
        font-size: 13px;
        line-height: 1.65;
      }

      button {
        min-height: 44px;
        margin-top: 24px;
        border: 0;
        border-radius: 12px;
        padding: 0 18px;
        background: #3b82f6;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        font-weight: 650;
        transition:
          background 0.15s,
          box-shadow 0.15s;
      }

      button:hover {
        background: #60a5fa;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
      }

      button:focus-visible {
        outline: 3px solid rgba(59, 130, 246, 0.38);
        outline-offset: 3px;
      }

      @media (max-width: 520px) {
        body {
          padding: 16px;
        }

        main {
          padding: 22px;
        }

        h1 {
          font-size: 23px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p>Нет соединения</p>
      <h1>CheenHub запущен без интернета</h1>
      <p>
        Сейчас доступна только сохранённая оболочка приложения. Подключитесь к
        интернету, и CheenHub вернётся к последнему открытому разделу.
      </p>
      <button id="pwa-offline-retry" type="button">Проверить соединение</button>
    </main>
  </body>
</html>
