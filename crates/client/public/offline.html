<!doctype html>
<html lang="ru" data-pwa-offline-shell="true">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>CheenHub — нет соединения</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <script defer src="/pwa-register.js"></script>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
        background:
          radial-gradient(circle at 20% 0%, rgba(37, 99, 235, 0.20), transparent 32rem),
          linear-gradient(135deg, #111827 0%, #172033 44%, #0f172a 100%);
        color: #f8fafc;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 460px);
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 8px;
        padding: 28px;
        background: rgba(15, 23, 42, 0.86);
        box-shadow: 0 24px 70px rgba(2, 6, 23, 0.38);
      }

      p:first-child {
        margin: 0 0 10px;
        color: #93c5fd;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.12;
        letter-spacing: 0;
      }

      p {
        margin: 14px 0 0;
        color: #cbd5e1;
        font-size: 15px;
        line-height: 1.55;
      }

      button {
        min-height: 44px;
        margin-top: 24px;
        border: 0;
        border-radius: 8px;
        padding: 0 18px;
        background: #60a5fa;
        color: #08111f;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      button:focus-visible {
        outline: 3px solid rgba(147, 197, 253, 0.76);
        outline-offset: 3px;
      }

      @media (max-width: 520px) {
        body {
          padding: 16px;
        }

        main {
          padding: 22px;
        }

        h1 {
          font-size: 23px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p>Нет соединения</p>
      <h1>CheenHub запущен без интернета</h1>
      <p>
        Сейчас доступна только сохранённая оболочка приложения. Подключитесь к
        интернету, и CheenHub вернётся к последнему открытому разделу.
      </p>
      <button id="pwa-offline-retry" type="button">Проверить соединение</button>
    </main>
  </body>
</html>
