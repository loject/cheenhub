[workspace]
members = [
    "crates/backend",
    "crates/client",
    "crates/contracts",
    "crates/migrations",
]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT"
repository = "https://github.com/loject/cheenhub"
rust-version = "1.92"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
axum = "0.8"
dioxus = "=0.7.5"
dotenvy = "0.15"
sea-orm = { version = "1.1", default-features = false, features = ["macros", "runtime-tokio-rustls", "sqlx-postgres"] }
sea-orm-migration = { version = "1.1", default-features = false, features = ["cli", "runtime-tokio-rustls", "sqlx-postgres"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "net", "rt-multi-thread"] }
tower-http = { version = "0.6", features = ["trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
web-sys = { version = "0.3", features = ["Window"] }
