server {
    listen 80;
    server_name cheenhub.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://cheenhub.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name cheenhub.ru;

    resolver 127.0.0.11 ipv6=off valid=30s;
    set $backend_upstream backend:3000;

    ssl_certificate /etc/letsencrypt/live/cheenhub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cheenhub.ru/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:CheenHubSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /usr/share/nginx/html;
    index index.html;

    location = /sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    location = /manifest.webmanifest {
        try_files $uri =404;
        types {
            application/manifest+json webmanifest;
        }
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    location = /pwa-register.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location = /offline.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location = /api/realtime/ws {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_buffering off;
    }

    location /api/ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /wasm/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /icons/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location /screenshots/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
